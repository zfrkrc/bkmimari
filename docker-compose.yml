version: '3.8'

services:
  bkmimari_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bkmimari_nextjs
    ports:
      - "${APP_PORT:-8080}:80"
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=80
      - HOSTNAME=${HOSTNAME:-0.0.0.0}
      - MINIO_RAW_ENDPOINT=${MINIO_RAW_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
