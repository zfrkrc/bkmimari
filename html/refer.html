<script>
(function() {
  var nav      = document.getElementById('nav');
  var toggle   = document.getElementById('navToggle');
  var links    = document.getElementById('navLinks');
  var isOpen   = false;

  // Scroll → gölge ekle, logo boyutu değişmez
  window.addEventListener('scroll', function() {
    nav.classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });

  // Hamburger aç/kapat
  toggle.addEventListener('click', function(e) {
    e.stopPropagation();
    isOpen = !isOpen;
    links.classList.toggle('open', isOpen);
    // X animasyonu
    var spans = toggle.querySelectorAll('span');
    if (isOpen) {
      spans[0].style.transform = 'translateY(6.5px) rotate(45deg)';
      spans[1].style.opacity = '0';
      spans[2].style.transform = 'translateY(-6.5px) rotate(-45deg)';
    } else {
      spans[0].style.transform = '';
      spans[1].style.opacity = '';
      spans[2].style.transform = '';
    }
  });

  // Dışarı tıklayınca kapat
  document.addEventListener('click', function(e) {
    if (isOpen && !nav.contains(e.target)) {
      isOpen = false;
      links.classList.remove('open');
      var spans = toggle.querySelectorAll('span');
      spans[0].style.transform = '';
      spans[1].style.opacity = '';
      spans[2].style.transform = '';
    }
  });

  // Menü linkine tıklayınca kapat (aynı sayfada)
  links.querySelectorAll('.nav__link').forEach(function(a) {
    a.addEventListener('click', function() {
      isOpen = false;
      links.classList.remove('open');
    });
  });
})();
</script>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lb">
  <button class="lb-close" id="lbClose">&#215;</button>
  <button class="lb-prev" id="lbPrev">&#8249;</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-next" id="lbNext">&#8250;</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<script>
(function() {
  var overlay  = document.getElementById('lb');
  var lbImg    = document.getElementById('lbImg');
  var lbClose  = document.getElementById('lbClose');
  var lbPrev   = document.getElementById('lbPrev');
  var lbNext   = document.getElementById('lbNext');
  var counter  = document.getElementById('lbCounter');
  var allImgs  = [];
  var curIdx   = 0;

  // Tüm IMG taglarını bul
  document.querySelectorAll('img').forEach(function(img) {
    if (!img.closest('.nav__logo') && !img.closest('.footer__logo')) {
      allImgs.push(img.src);
      img.style.cursor = 'pointer';
      img.addEventListener('click', function(e) {
        e.stopPropagation();
        var src = this.src;
        curIdx = allImgs.indexOf(src);
        show();
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    }
  });

  function show() {
    lbImg.src = allImgs[curIdx];
    counter.textContent = (curIdx + 1) + ' / ' + allImgs.length;
  }

  lbClose.addEventListener('click', function() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  });

  lbPrev.addEventListener('click', function(e) {
    e.stopPropagation();
    curIdx = (curIdx - 1 + allImgs.length) % allImgs.length;
    show();
  });

  lbNext.addEventListener('click', function(e) {
    e.stopPropagation();
    curIdx = (curIdx + 1) % allImgs.length;
    show();
  });

  // Overlay tıkla → kapat
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (!overlay.classList.contains('open')) return;
    if (e.key === 'Escape') {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    if (e.key === 'ArrowLeft') {
      curIdx = (curIdx - 1 + allImgs.length) % allImgs.length;
      show();
    }
    if (e.key === 'ArrowRight') {
      curIdx = (curIdx + 1) % allImgs.length;
      show();
    }
  });
})();
</script>
