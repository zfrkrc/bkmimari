worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Sunucu bilgisini gizle
    server_tokens off;

    # Gzip sıkıştırma
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/html
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Ana sayfa ve dosya yönlendirme
        location / {
            try_files $uri $uri/ =404;
        }

        # Statik dosyalar için uzun cache süresi
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|svg|eot|webp)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, no-transform, immutable";
        }

        # HTML dosyaları için kısa cache (içerik değişebilir)
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Güvenlik başlıkları
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header X-Frame-Options           "SAMEORIGIN"      always;
        add_header X-XSS-Protection          "1; mode=block"   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # robots.txt ve sitemap için log kapatma
        location = /robots.txt  { access_log off; log_not_found off; }
        location = /sitemap.xml { access_log off; log_not_found off; }

        location /health {
            return 200;
        }     
        # .hidden dosyalarına erişimi engelle
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
