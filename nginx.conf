worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip ayarlarý
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        font/ttf
        font/otf;

    server {
        listen 80;
        server_name localhost;

        # Root klasörü
        root /usr/share/nginx/html;
        index index.html;

        # Ana sayfa ve dosya yönlendirme
        location / {
            try_files $uri $uri/ =404;
        }

        # Uzun süreli cache ayarý (statik dosyalar için)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|svg|eot|webp)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        # Ek güvenlik baţlýklarý (isteđe bađlý)
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }
}
